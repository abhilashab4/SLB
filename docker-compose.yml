version: "3.9"

services:

  registry:
    build:
      context: .
      dockerfile: Dockerfile.registry
    ports:
      - "8000:8000"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8081:8081"
    depends_on:
      - registry
      - server1
      - server2
      - server3

  server1:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.server1.main:app --host 0.0.0.0 --port 9001
    ports:
      - "9001:9001"

  server2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.server2.main:app --host 0.0.0.0 --port 9002
    ports:
      - "9002:9002"

  server3:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.server3.main:app --host 0.0.0.0 --port 9003
    ports:
      - "9003:9003"